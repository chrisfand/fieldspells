  gl.uniform1f(loc.uSourceRgbScale,mesh.sourceRgbScale||1);
  gl.uniform3fv(loc.uMaterialAmbient,mesh.materialAmbient||[1,1,1]);
  gl.uniform3fv(loc.uMaterialDiffuse,mesh.materialDiffuse||[1,1,1]);
  gl.uniform3fv(loc.uMaterialEmissive,mesh.emissive||[0,0,0]);
  if(mesh.cullFace){gl.enable(gl.CULL_FACE);gl.frontFace(gl.CW);gl.cullFace(gl.FRONT);}else{gl.disable(gl.CULL_FACE);}
  if(mesh.depthOffset){gl.enable(gl.POLYGON_OFFSET_FILL);gl.polygonOffset(-8,-8);}else{gl.disable(gl.POLYGON_OFFSET_FILL);}
  gl.depthMask(mesh.depthWrite!==false);
  if(pass==='opaque'){
    gl.disable(gl.BLEND);
    gl.uniform1i(loc.uTextureAlphaMode,mesh.textureAlphaMode||0);
    gl.drawElements(gl.TRIANGLES,mesh.count,gl.UNSIGNED_INT,0);
    return;
  }
  gl.enable(gl.BLEND);
  if(mesh.blendState===0x00060200){
    gl.depthMask(false);
    gl.uniform1i(loc.uTextureAlphaMode,2);
    gl.blendFunc(gl.DST_COLOR,gl.ONE);
    gl.drawElements(gl.TRIANGLES,mesh.count,gl.UNSIGNED_INT,0);
    gl.uniform1i(loc.uTextureAlphaMode,0);
    gl.blendFunc(gl.SRC_ALPHA,gl.ONE);
    gl.drawElements(gl.TRIANGLES,mesh.count,gl.UNSIGNED_INT,0);
    return;
  }
  gl.uniform1i(loc.uTextureAlphaMode,mesh.textureAlphaMode||0);
  if(mesh.blendState===0x00000000){
    gl.blendFunc(gl.DST_COLOR,gl.SRC_COLOR);
  }else if(mesh.blendState===0x000A0100){
    const fix=mesh.blendFixB||[1,1,1];
    gl.blendColor(fix[0],fix[1],fix[2],1);
    gl.blendFunc(gl.ONE_MINUS_DST_COLOR,gl.CONSTANT_COLOR);
  }else if(mesh.blendState===0x000A0200 || mesh.blendState===0x000A0600){
    const fix=mesh.blendFixB||[1,1,1];
    gl.blendColor(fix[0],fix[1],fix[2],1);
    gl.blendFunc(gl.SRC_ALPHA,gl.CONSTANT_COLOR);
  }else{
    gl.blendFunc(gl.SRC_ALPHA,pass==='additive'?gl.ONE:gl.ONE_MINUS_SRC_ALPHA);
  }
  gl.drawElements(gl.TRIANGLES,mesh.count,gl.UNSIGNED_INT,0);
}

const b=DATA.bounds, center=[(b[0]+b[3])/2,(b[1]+b[4])/2,(b[2]+b[5])/2];
const radius=Math.max(0.001, Math.hypot(b[3]-b[0],b[4]-b[1],b[5]-b[2])/2);
let yaw=-0.55, pitch=-0.35, distance=radius*2.7, orbitTarget=[...center], orbitUp=[0,1,0], playing=true, currentFrame=0, lastTime=performance.now(), dragging=false, px=0, py=0;
function orbitEye(){const cp=Math.cos(pitch);return [orbitTarget[0]+Math.sin(yaw)*cp*distance,orbitTarget[1]+Math.sin(pitch)*distance,orbitTarget[2]+Math.cos(yaw)*cp*distance];}
function setOrbitFromEyeTarget(eye,target,up){orbitTarget=[...target];orbitUp=[...up];const dx=eye[0]-target[0],dy=eye[1]-target[1],dz=eye[2]-target[2];distance=Math.max(radius*.001,Math.hypot(dx,dy,dz));pitch=Math.asin(Math.max(-.999,Math.min(.999,dy/distance)));yaw=Math.atan2(dx,dz);}
function syncOrbitToGameCamera(){const scene=sceneState(currentFrame);if(scene)setOrbitFromEyeTarget(scene.eye,scene.target,scene.up);}
function resetView(){ orbitTarget=[...center]; orbitUp=[0,1,0]; yaw=-0.55; pitch=-0.35; distance=radius*2.7; }

function updateTracks(frame) {
  if (!tracks) return;
  const rows=[];
  if(DATA.animation)rows.push(`<div class="track"><b>${DATA.animation.name}</b><br>skeletal frame ${Math.min(DATA.animation.frameCount-1,Math.floor(frame))} · ${DATA.animation.boneCount} bones</div>`);
  if(DATA.scene){const s=sceneState(frame),verticalDegrees=s.verticalFov*180/Math.PI,horizontalFov=2*Math.atan(Math.tan(s.verticalFov/2)*(480/272))*180/Math.PI;rows.push(`<div class="track"><b>${DATA.scene.name}</b><br>focal length ${s.focalLength.toFixed(3)} mm · vertical FOV ${verticalDegrees.toFixed(2)}° · horizontal FOV ${horizontalFov.toFixed(2)}° · PSP viewport 480×272 · clip ${s.near.toFixed(2)}–${s.far.toFixed(2)} · fog ${s.fogEnabled?s.fogRange.map(v=>v.toFixed(2)).join('–'):'off'} · lights ${s.lights.filter(v=>v.enabled).length}</div>`);}
  rows.push(...renderMeshes.filter(m=>m.track).map(mesh => { const s=state(mesh,frame); return `<div class="track"><b>${mesh.name}</b> ${mesh.source || mesh.material}<br>offset (${s.ou.toFixed(4)}, ${s.ov.toFixed(4)}) · scale (${s.su.toFixed(4)}, ${s.sv.toFixed(4)}) · alpha ${s.a.toFixed(3)}</div>`; }));
  tracks.innerHTML=rows.join('')||'<div>No TMT or TMA animation data.</div>';
}
function wrapFrame(value){if(maxFrame<=0)return 0;const period=maxFrame+1;return ((Number(value)||0)%period+period)%period;}
function setFrame(value) { currentFrame=wrapFrame(value); if(frameSlider)frameSlider.value=currentFrame; if(frameNumber)frameNumber.value=Math.round(currentFrame); updateTracks(currentFrame); }
if(playButton)playButton.onclick=()=>{playing=!playing; playButton.textContent=playing?'Pause':'Play'; lastTime=performance.now();};
if(frameSlider)frameSlider.oninput=()=>{playing=false;if(playButton)playButton.textContent='Play';setFrame(frameSlider.value);};
if(frameNumber)frameNumber.onchange=()=>setFrame(frameNumber.value);
if(gameCameraToggle)gameCameraToggle.onchange=()=>{gameCameraEnabled=gameCameraToggle.checked;if(!gameCameraEnabled)syncOrbitToGameCamera();};
if(lightingToggle)lightingToggle.onchange=()=>{lightingEnabled=lightingToggle.checked;};
if(fogToggle)fogToggle.onchange=()=>{fogEnabled=fogToggle.checked;};
canvas.onpointerdown=e=>{if(gameCameraEnabled){syncOrbitToGameCamera();gameCameraEnabled=false;if(gameCameraToggle)gameCameraToggle.checked=false;}dragging=true;px=e.clientX;py=e.clientY;canvas.classList.add('dragging');canvas.setPointerCapture(e.pointerId);};
canvas.onpointermove=e=>{if(!dragging)return;yaw+=(e.clientX-px)*.008;pitch=Math.max(-1.5,Math.min(1.5,pitch+(e.clientY-py)*.008));px=e.clientX;py=e.clientY;};
canvas.onpointerup=()=>{dragging=false;canvas.classList.remove('dragging');};
canvas.onwheel=e=>{e.preventDefault();distance=Math.max(radius*.005,Math.min(radius*20,distance*Math.exp(e.deltaY*.001)));};
canvas.ondblclick=()=>{resetView();if(DATA.scene){gameCameraEnabled=true;if(gameCameraToggle)gameCameraToggle.checked=true;}};

gl.enable(gl.DEPTH_TEST); gl.depthFunc(gl.LEQUAL); gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA); gl.disable(gl.CULL_FACE);
function draw(now) {
  const dt=(now-lastTime)/1000; lastTime=now;
  if (playing) setFrame(currentFrame+dt*DATA.fps);
  const dpr=Math.min(devicePixelRatio||1,2), w=Math.max(1,Math.floor(canvas.clientWidth*dpr)), h=Math.max(1,Math.floor(canvas.clientHeight*dpr));
  if(canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h;}
  gl.clearColor(.045,.06,.08,1); gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  const scene=sceneState(currentFrame), useGameCamera=scene&&gameCameraEnabled;
  let view,projection,cameraPosition;
  if(useGameCamera){view=lookAt(scene.eye,scene.target,scene.up);projection=perspective(scene.verticalFov,480/272,scene.near,scene.far);cameraPosition=scene.eye;const aspect=480/272;let vw=w,vh=Math.floor(w/aspect);if(vh>h){vh=h;vw=Math.floor(h*aspect);}gl.viewport(Math.floor((w-vw)/2),Math.floor((h-vh)/2),vw,vh);}else{cameraPosition=orbitEye();view=lookAt(cameraPosition,orbitTarget,orbitUp);const orbitNear=Math.max(.001,Math.min(radius*.001,distance*.02));projection=perspective(scene?scene.verticalFov:Math.PI/4,scene?480/272:w/h,orbitNear,scene?scene.far:radius*100);if(scene){const aspect=480/272;let vw=w,vh=Math.floor(w/aspect);if(vh>h){vh=h;vw=Math.floor(h*aspect);}gl.viewport(Math.floor((w-vw)/2),Math.floor((h-vh)/2),vw,vh);}else gl.viewport(0,0,w,h);}
  const mvp=mul(projection,view);
  gl.uniformMatrix4fv(loc.uMvp,false,mvp);gl.uniformMatrix4fv(loc.uView,false,view);gl.uniform1i(loc.uTexture,0);gl.uniform1i(loc.uBoneTexture,1);gl.uniform3fv(loc.uCameraPosition,cameraPosition);
  if(scene){const positions=[],directions=[],ambients=[],diffuses=[],speculars=[],attenuations=[],spots=[];for(const light of scene.lights){positions.push(...light.position);directions.push(...light.direction);ambients.push(...light.ambient);diffuses.push(...light.diffuse);speculars.push(...light.specular);attenuations.push(...light.attenuation);spots.push(light.exponent,light.cutoff);}gl.uniform1i(loc.uLightingEnabled,lightingEnabled?1:0);gl.uniform3fv(loc.uGlobalAmbient,scene.ambient);gl.uniform4fv(loc.uLightEnabled,scene.lights.map(light=>light.enabled));gl.uniform4fv(loc.uLightType,scene.lights.map(light=>light.type));gl.uniform3fv(loc.uLightPosition,positions);gl.uniform3fv(loc.uLightDirection,directions);gl.uniform3fv(loc.uLightAmbient,ambients);gl.uniform3fv(loc.uLightDiffuse,diffuses);gl.uniform3fv(loc.uLightSpecular,speculars);gl.uniform3fv(loc.uLightAttenuation,attenuations);gl.uniform2fv(loc.uLightSpot,spots);gl.uniform1i(loc.uFogEnabled,fogEnabled&&scene.fogEnabled?1:0);gl.uniform2fv(loc.uFogRange,scene.fogRange);gl.uniform3fv(loc.uFogColor,scene.fogColor);}else{gl.uniform1i(loc.uLightingEnabled,0);gl.uniform3f(loc.uGlobalAmbient,1,1,1);gl.uniform4f(loc.uLightEnabled,0,0,0,0);gl.uniform1i(loc.uFogEnabled,0);}
  if(DATA.animation&&boneTexture){const frame=Math.min(DATA.animation.frameCount-1,Math.floor(currentFrame));gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_2D,boneTexture.texture);gl.activeTexture(gl.TEXTURE0);gl.uniform1i(loc.uBoneCount,DATA.animation.boneCount);gl.uniform1i(loc.uBoneTextureWidth,boneTexture.width);gl.uniform1i(loc.uBoneFrameOffset,frame*DATA.animation.boneCount*4);}else{gl.uniform1i(loc.uBoneCount,0);gl.uniform1i(loc.uBoneTextureWidth,1);gl.uniform1i(loc.uBoneFrameOffset,0);}
  const opaqueMeshes=renderMeshes.filter(mesh=>mesh.blend==='opaque').sort((a,b)=>(a.drawOrder||0)-(b.drawOrder||0));
  for(const mesh of opaqueMeshes)drawMesh(mesh,'opaque',currentFrame);
  const orderedBlend=renderMeshes.filter(mesh=>(mesh.blend==='alpha'||mesh.blend==='additive')&&mesh.depthWrite!==false).sort((a,b)=>(a.drawOrder||0)-(b.drawOrder||0));
  for(const mesh of orderedBlend)drawMesh(mesh,mesh.blend==='additive'?'additive':'alpha',currentFrame);
  const sortedAlpha=renderMeshes.filter(mesh=>mesh.blend==='alpha'&&mesh.depthWrite===false).sort((a,b)=>meshViewDepth(b,view)-meshViewDepth(a,view));
  for(const mesh of sortedAlpha)drawMesh(mesh,'alpha',currentFrame);
  const additiveMeshes=renderMeshes.filter(mesh=>mesh.blend==='additive'&&mesh.depthWrite===false).sort((a,b)=>meshViewDepth(b,view)-meshViewDepth(a,view));
  for(const mesh of additiveMeshes)drawMesh(mesh,'additive',currentFrame);
  gl.depthMask(true);
  requestAnimationFrame(draw);
}
setFrame(0); requestAnimationFrame(draw);
</script>
